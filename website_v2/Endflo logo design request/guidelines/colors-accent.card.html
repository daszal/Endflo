<!-- @dsCard group="Colors" viewport="700x170" subtitle="Two accents, shared lightness/chroma, hue rotated" name="Accents" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
  html,body{margin:0;padding:0;background:transparent;font-family:var(--font-body);}
  
  </style></head><body>
<div style="display:flex;gap:14px;padding:16px;">
  <div style="flex:1;">
    <div style="height:90px;border-radius:var(--radius-md);background:var(--accent-indigo);"></div>
    <div style="margin-top:10px;font-weight:700;font-size:13px;color:var(--text-primary);">Flow Indigo</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-faint);">links, active states</div>
  </div>
  <div style="flex:1;">
    <div style="height:90px;border-radius:var(--radius-md);background:var(--accent-amber);"></div>
    <div style="margin-top:10px;font-weight:700;font-size:13px;color:var(--text-primary);">Signal Amber</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-faint);">sparing emphasis, alerts</div>
  </div>
  <div style="flex:1;">
    <div style="height:90px;border-radius:var(--radius-md);background:var(--success);"></div>
    <div style="margin-top:10px;font-weight:700;font-size:13px;color:var(--text-primary);">Success</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-faint);">#1F8A5B</div>
  </div>
  <div style="flex:1;">
    <div style="height:90px;border-radius:var(--radius-md);background:var(--danger);"></div>
    <div style="margin-top:10px;font-weight:700;font-size:13px;color:var(--text-primary);">Danger</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-faint);">#C24A3B</div>
  </div>
</div></body></html>
