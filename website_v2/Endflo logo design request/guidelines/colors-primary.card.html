<!-- @dsCard group="Colors" viewport="700x170" subtitle="Ink, paper, mist — the neutral system" name="Neutrals" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
  html,body{margin:0;padding:0;background:transparent;font-family:var(--font-body);}
  
  </style></head><body>
<div style="display:flex;gap:14px;padding:16px;">
  <div style="flex:1;">
    <div style="height:90px;border-radius:var(--radius-md);background:var(--ink);border:1px solid var(--border-subtle);"></div>
    <div style="margin-top:10px;font-weight:700;font-size:13px;color:var(--text-primary);">Ink</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-faint);">#0B0B0C</div>
  </div>
  <div style="flex:1;">
    <div style="height:90px;border-radius:var(--radius-md);background:var(--paper);border:1px solid var(--border-subtle);"></div>
    <div style="margin-top:10px;font-weight:700;font-size:13px;color:var(--text-primary);">Paper</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-faint);">#F6F5F0</div>
  </div>
  <div style="flex:1;">
    <div style="height:90px;border-radius:var(--radius-md);background:var(--mist);"></div>
    <div style="margin-top:10px;font-weight:700;font-size:13px;color:var(--text-primary);">Mist</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-faint);">#DEDCD2</div>
  </div>
  <div style="flex:1;">
    <div style="height:90px;border-radius:var(--radius-md);background:var(--mist-strong);"></div>
    <div style="margin-top:10px;font-weight:700;font-size:13px;color:var(--text-primary);">Mist Strong</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-faint);">#B9B6A9</div>
  </div>
</div></body></html>
