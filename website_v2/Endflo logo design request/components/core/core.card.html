<!-- @dsCard group="Components" viewport="700x300" subtitle="Button, Badge, Card — core primitives" name="Core" -->
<html><head><link rel="stylesheet" href="../../styles.css">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>html,body{margin:0;font-family:var(--font-body);background:var(--paper);}</style>
</head><body>
<div id="root" style="padding:20px;"></div>
<script type="text/babel">
const NS = window.EndfloDesignSystem || window.DesignSystem || window.Endflo || {};
const { Button, Badge, Card } = NS;
function Demo(){
  if (!Button) return <div style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--text-faint)'}}>Bundle not found — open via the Design System tab.</div>;
  return (
    <div style={{display:'flex',flexDirection:'column',gap:20}}>
      <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
        <Button variant="primary">Run workflow</Button>
        <Button variant="secondary">Secondary</Button>
        <Button variant="ghost">Ghost</Button>
        <Button variant="accent">Accent</Button>
        <Button variant="primary" disabled>Disabled</Button>
      </div>
      <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
        <Badge tone="neutral">Queued</Badge>
        <Badge tone="ink">Running</Badge>
        <Badge tone="success">Streamlined</Badge>
        <Badge tone="danger">Failed</Badge>
        <Badge tone="indigo">New</Badge>
        <Badge tone="amber">Alert</Badge>
      </div>
      <Card>
        <div style={{fontWeight:700,fontSize:16,marginBottom:6,color:'var(--text-primary)'}}>Card</div>
        <div style={{fontSize:14,color:'var(--text-muted)'}}>Base surface for panels, rows and content blocks.</div>
      </Card>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
