<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Gritline</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* ---- Endflo brand: ink/paper monochrome · Sora / Space Mono / Manrope ---- */
    @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@800&family=Sora:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

    :root {
      /* Paper (light) theme */
      --bg: #F6F5F0;
      --surface: #FFFFFF;
      --text: #0B0B0C;
      --muted: #55534B;
      --faint: #8A887E;
      --accent: #3F5DE0;
      --accent-alpha: rgba(63, 93, 224, 0.12);
      --accent-amber: #E0973F;
      --done: #1F8A5B;
      --done-alpha: rgba(31, 138, 91, 0.12);
      --danger: #C24A3B;
      --danger-alpha: rgba(194, 74, 59, 0.12);
      --border: #DEDCD2;          /* mist */
      --border-strong: #B9B6A9;   /* mist-strong */
      --nav-bg: rgba(246, 245, 240, 0.92);
      --radius: 18px;
      --radius-sm: 12px;
      --radius-pill: 999px;
      --font-body: 'Sora', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'Space Mono', monospace;
      --font-display: 'Manrope', sans-serif;
      --tracking-mono: 0.14em;
    }
    :root[data-theme="dark"] {
      /* Ink (dark) theme — light theme mirrored, per tokens/colors.css "ink mode".
         Warm raised surface + warm grays (mist family), never cool/blue neutrals.
         Accents keep hue, rise in lightness to clear contrast on ink. */
      --bg: #0B0B0C;
      --surface: #161614;        /* ink-raised */
      --text: #F6F5F0;
      --muted: #A9A69B;
      --faint: #767369;
      --accent: #8DA2F2;         /* Flow Indigo, bright */
      --accent-alpha: rgba(141, 162, 242, 0.20);
      --accent-amber: #E7A95F;   /* Signal Amber, bright */
      --done: #53B88C;
      --done-alpha: rgba(83, 184, 140, 0.18);
      --danger: #D98577;
      --danger-alpha: rgba(217, 133, 119, 0.18);
      --border: #2B2A26;         /* mist-dark */
      --border-strong: #4D4B44;  /* mist-dark-strong */
      --nav-bg: rgba(11, 11, 12, 0.92);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.45;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.3s ease, color 0.3s ease;
      -webkit-font-smoothing: antialiased;
    }

    /* Space Mono label utility (kickers, counts, tiny captions) */
    .mono-label {
      font-family: var(--font-mono);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: var(--tracking-mono);
    }

    /* ---- Tab nav ---- */
    .tab-nav {
      display: flex;
      position: sticky; top: 0; z-index: 10;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      gap: 4px;
    }
    .tab-nav button {
      flex: 1; padding: 10px 2px;
      background: transparent; border: none;
      font-family: var(--font-body);
      font-size: 12.5px; font-weight: 600; letter-spacing: -0.01em;
      color: var(--muted); cursor: pointer;
      border-radius: var(--radius-pill);
      transition: background .2s ease, color .2s ease, opacity .15s ease;
      min-height: 40px;
    }
    .tab-nav button.active {
      color: var(--bg);
      background: var(--text);
    }
    .tab-nav button:not(.active):active { opacity: 0.75; }
    .gear-btn {
      flex: none !important; width: 44px;
      display: flex; align-items: center; justify-content: center;
    }
    .gear-btn svg { width: 18px; height: 18px; }

    /* ---- Content area ---- */
    .tab-content { display: none; padding: 20px 16px; }
    .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ---- SVG Icons ---- */
    .chevron-icon {
      width: 16px; height: 16px;
      color: var(--faint);
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
    }
    .edit-svg {
      width: 15px; height: 15px;
      color: var(--muted);
      transition: color 0.2s;
    }
    .pin-icon { width: 12px; height: 12px; flex-shrink: 0; }

    /* ---- Cards: flat surface, mist border, no shadows (brand rule) ---- */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      padding: 16px;
      margin-bottom: 12px;
      display: flex; align-items: flex-start; gap: 14px;
      transition: transform .15s ease, opacity .2s ease, border-color .2s ease;
    }
    .card:active { transform: scale(0.98); }
    .card.checked { opacity: 0.5; }
    .card.checked .card-title { text-decoration: line-through; color: var(--muted); }
    .card-body { flex:1; min-width:0; }
    .card-title { font-weight: 600; font-size: 14.5px; margin-bottom: 6px; word-break: break-word; line-height: 1.35; letter-spacing: -0.01em; }
    .card-meta { font-size: 12px; color: var(--muted); display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
    .card-date {
      font-family: var(--font-mono); font-size: 9.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--faint); margin-top: 8px; display: block;
    }

    /* Check-circle */
    .check-circle {
      width: 24px; height: 24px; min-width: 24px;
      border-radius: 50%;
      border: 2px solid var(--border-strong);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all .2s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 2px;
      background: transparent;
    }
    .card:not(.checked) .check-circle:hover { border-color: var(--accent); background: var(--accent-alpha); }
    .card.checked .check-circle {
      background: var(--text);
      border-color: var(--text);
    }
    .check-circle::after {
      content: '✓'; font-size: 13px; font-weight: 800;
      color: var(--bg); opacity: 0; transform: scale(0.5);
      transition: all .2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card.checked .check-circle::after { opacity: 1; transform: scale(1); }

    /* ---- Date section headers: Space Mono kickers ---- */
    .date-header {
      font-family: var(--font-mono);
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: var(--tracking-mono); padding: 18px 4px 10px 4px;
      color: var(--faint);
      display: flex; align-items: center; gap: 8px;
    }
    .date-header::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; flex-shrink: 0;
    }
    .date-header.overdue { color: var(--danger); }
    .date-header.today   { color: var(--accent-amber); }

    /* ---- Overview Cards ---- */
    .overview-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 24px;
    }
    .overview-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 14px 8px; text-align: center;
      display: flex; flex-direction: column; gap: 6px;
    }
    .overview-val {
      font-family: var(--font-display); font-size: 23px; font-weight: 800;
      letter-spacing: -0.03em; color: var(--text); line-height: 1;
    }
    .overview-label {
      font-family: var(--font-mono); font-size: 9px; color: var(--faint);
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; line-height: 1.4;
    }

    /* ---- Project groups ---- */
    .project-group { margin-bottom: 24px; }
    .project-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 4px; cursor: pointer; user-select: none;
    }
    .project-header .project-name {
      font-weight: 700; font-size: 15px; color: var(--text); flex: 1; letter-spacing: -0.01em;
    }
    .project-header .project-count {
      font-family: var(--font-mono); font-size: 10.5px; font-weight: 700;
      background: transparent; color: var(--muted);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-pill); padding: 3px 10px;
    }
    .project-header.collapsed .chevron-icon { transform: rotate(-90deg); }
    .project-items { overflow: hidden; }
    .project-items.collapsed { display: none; }

    /* ---- Meeting cards ---- */
    .meeting-card { position: relative; align-items: center; }
    .meeting-time-col {
      display: flex; flex-direction: column; align-items: flex-start;
      min-width: 80px; justify-content: center;
    }
    .meeting-time {
      font-size: 16px; font-weight: 700; color: var(--text);
      line-height: 1.1; letter-spacing: -0.02em;
    }
    .meeting-date {
      font-family: var(--font-mono);
      font-size: 9.5px; font-weight: 700; color: var(--faint);
      margin-top: 5px; text-transform: uppercase; letter-spacing: 0.08em;
    }
    .meeting-location {
      font-size: 12px; color: var(--muted); margin: 4px 0 8px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      display: flex; align-items: center; gap: 5px;
    }
    .project-pill {
      display: inline-flex; align-items: center; padding: 3px 10px;
      border-radius: var(--radius-pill);
      border: 1px solid var(--border-strong);
      background: transparent; color: var(--muted);
      font-family: var(--font-mono);
      font-size: 9.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .dismiss-btn {
      position: absolute; top: 12px; right: 12px;
      background: transparent; border: 1px solid var(--border); border-radius: 50%;
      color: var(--muted);
      cursor: pointer; width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .dismiss-btn svg { width: 13px; height: 13px; }
    .dismiss-btn:hover { border-color: var(--border-strong); color: var(--text); }
    .dismiss-btn:active { transform: scale(0.9); opacity: 0.75; }

    /* ---- Triage ---- */
    .triage-ref {
      font-family: var(--font-mono); font-size: 10.5px; color: var(--faint);
      letter-spacing: 0.06em; margin-top: 6px; padding-left: 10px;
      border-left: 1.5px solid var(--border-strong);
    }
    .triage-actions { display: flex; gap: 10px; margin-top: 16px; }
    .resolve-btn, .clarify-btn {
      flex: 1; padding: 11px; border-radius: var(--radius-pill);
      font-family: var(--font-body);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .resolve-btn {
      background: transparent; color: var(--text);
      border: 1.5px solid var(--text);
    }
    .resolve-btn:hover { opacity: 0.85; }
    .clarify-btn {
      background: var(--accent-alpha); color: var(--accent);
      border: 1.5px solid transparent;
    }
    .clarify-btn:hover { opacity: 0.85; }
    .resolve-btn:active, .clarify-btn:active { transform: scale(0.96); opacity: 0.75; }

    .clarify-input {
      width: 100%; padding: 14px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 14px; font-family: var(--font-body);
      background: var(--bg); color: var(--text);
      resize: vertical; min-height: 80px; margin-bottom: 12px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .clarify-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-alpha);
    }
    .clarify-sent {
      color: var(--done); font-size: 13px; font-weight: 600; margin-top: 10px;
      display: flex; align-items: center; gap: 6px;
    }

    /* ---- Deadlines ---- */
    .deadline { color: var(--accent-amber); font-weight: 600; }
    .deadline.overdue { color: var(--danger); }

    /* ---- Empty / error / skeleton ---- */
    .empty-state { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty-state .icon { margin-bottom: 16px; }
    .empty-state .icon svg { width: 44px; height: 44px; color: var(--border-strong); }
    .empty-state p { font-size: 15px; font-weight: 500; }

    .error-state { text-align: center; padding: 60px 20px; color: var(--danger); }
    .error-state button {
      margin-top: 16px; background: var(--text); color: var(--bg);
      border: none; padding: 12px 28px; border-radius: var(--radius-pill);
      font-family: var(--font-body);
      font-size: 14px; font-weight: 700; cursor: pointer; transition: transform 0.2s, opacity 0.15s;
    }
    .error-state button:active { transform: scale(0.95); opacity: 0.75; }

    .skeleton { animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%,100% {opacity:1} 50% {opacity:0.5} }
    .sk-line { height: 14px; background: var(--border); border-radius: 8px; margin-bottom: 12px; }
    .sk-line.w80 { width: 80%; } .sk-line.w60 { width: 60%; } .sk-line.w40 { width: 40%; }

    /* ---- Settings ---- */
    .settings-card { margin-bottom: 16px; padding: 16px; }
    .settings-section { margin-bottom: 32px; }
    .settings-section h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text); letter-spacing: -0.01em; }

    .settings-row { display: flex; align-items: center; gap: 12px; }
    .settings-row .body { flex:1; min-width:0; }
    .settings-row .title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .settings-row .sub {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em;
      color: var(--faint); overflow: hidden; text-overflow: ellipsis;
    }

    .edit-btn, .part-edit-btn {
      background: transparent; border: 1px solid var(--border);
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: border-color 0.2s; flex-shrink: 0;
    }
    .edit-btn:hover, .part-edit-btn:hover { border-color: var(--border-strong); }
    .edit-btn:hover .edit-svg, .part-edit-btn:hover .edit-svg { color: var(--text); }

    .participant-dropdown { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); width: 100%; }
    .parts-header {
      display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;
      font-family: var(--font-mono);
      font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); transition: color 0.2s;
    }
    .parts-header:hover { color: var(--text); }
    .parts-header .chevron-icon { transform: rotate(-90deg); }
    .parts-header.open .chevron-icon { transform: rotate(0deg); }

    .parts-body { display: none; flex-direction: column; gap: 8px; margin-top: 12px; }
    .parts-body.open { display: flex; }

    .part-row {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      background: var(--bg); border-radius: var(--radius-sm); border: 1px solid transparent;
      transition: border 0.2s;
    }
    .part-row:hover { border-color: var(--border); }
    .part-name { font-size: 13px; font-weight: 600; }
    .part-role {
      font-family: var(--font-mono);
      font-size: 9px; font-weight: 700; padding: 3px 8px; border-radius: var(--radius-pill);
      background: transparent; color: var(--muted); border: 1px solid var(--border-strong);
      text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0;
    }
    .status-pill {
      font-family: var(--font-mono);
      font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: var(--radius-pill);
      text-transform: uppercase; letter-spacing: 0.06em; margin-left: 8px;
    }
    .status-pill.active {
      background: var(--done-alpha);
      color: var(--done);
      border: 1px solid var(--done);
    }
    .status-pill.inactive {
      background: var(--danger-alpha);
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    .part-phone { font-size: 11px; color: var(--faint); font-family: var(--font-mono); }

    /* Edit Forms */
    .inline-form {
      display: flex; flex-direction: column; gap: 12px; padding: 16px;
      background: var(--surface); border-radius: var(--radius); border: 1.5px solid var(--border);
      margin-top: 12px;
    }
    .part-edit-form {
      display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px;
      padding: 12px; background: var(--surface); border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
    }
    .inline-form input, .part-edit-form input, .part-edit-form select {
      padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 14px;
      background: var(--bg); color: var(--text); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; font-family: var(--font-body);
    }
    .inline-form input:focus, .part-edit-form input:focus, .part-edit-form select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-alpha);
    }
    /* Minimalist native select styling */
    .part-edit-form select {
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%238A887E%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 14px top 50%;
      background-size: 10px auto;
      padding-right: 32px;
    }

    .inline-form .btn-row, .part-edit-form .btn-row { display: flex; gap: 8px; width: 100%; margin-top: 4px; }
    .btn-save, .btn-cancel {
      flex: 1; padding: 12px 14px; border: none; border-radius: var(--radius-pill);
      font-family: var(--font-body);
      font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .btn-save:active, .btn-cancel:active { transform: scale(0.97); opacity: 0.75; }
    .btn-save { background: var(--text); color: var(--bg); }
    .btn-save:hover { opacity: 0.9; }
    .btn-cancel { background: transparent; color: var(--text); border: 1.5px solid var(--border-strong); }
    .btn-cancel:hover { border-color: var(--text); }

    /* ---- Bottom sheet ---- */
    .sheet-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(11, 11, 12, 0.55);
      opacity: 0; transition: opacity 0.25s ease;
    }
    .sheet-overlay.open { opacity: 1; }
    .sheet {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 101;
      background: var(--surface);
      border: 1.5px solid var(--border); border-bottom: none;
      border-radius: 24px 24px 0 0;
      max-height: 82vh;
      max-height: 82dvh;
      display: flex; flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .sheet.open { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px; border-radius: var(--radius-pill);
      background: var(--border-strong); margin: 10px auto 0; flex-shrink: 0;
    }
    .sheet-header {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px 10px; flex-shrink: 0;
    }
    .sheet-kicker {
      flex: 1;
      font-family: var(--font-mono); font-size: 10.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: var(--tracking-mono);
      color: var(--faint);
    }
    .sheet-close { position: static; flex-shrink: 0; }
    .sheet-body {
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 4px 20px 28px;
    }

    /* Sheet: source messages (triage) */
    .msg-row { margin-bottom: 16px; }
    .msg-row:last-child { margin-bottom: 0; }
    .msg-sender {
      display: flex; align-items: baseline; gap: 8px;
      font-family: var(--font-mono); font-size: 9.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--muted); margin-bottom: 5px;
    }
    .msg-time { font-weight: 400; color: var(--faint); }
    .msg-bubble {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px 12px 12px 12px;
      padding: 10px 12px; font-size: 13.5px; line-height: 1.5;
      word-break: break-word;
    }
    .msg-media {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--font-mono); font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--faint);
    }
    .msg-media svg { width: 13px; height: 13px; }
    .msg-media + div { margin-top: 6px; }

    /* Sheet: methodology / definitions */
    .sheet-stat {
      font-family: var(--font-display); font-size: 32px; font-weight: 800;
      letter-spacing: -0.03em; line-height: 1; margin: 6px 0 10px;
    }

function getDemoData(path) {
  const base = path.split('?')[0];
  return DEMO[base] || null;
}

const api = (path, opts = {}) => {
  if (IS_DEMO) {
    const method = (opts.method || 'GET').toUpperCase();
    const demo = getDemoData(path);
    if (demo) return Promise.resolve(JSON.parse(JSON.stringify(demo)));
    if (method === 'POST') return Promise.resolve({ status: 'ok', demo: true });
  }
  return fetch(path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'X-Telegram-InitData': TG?.initData || '',
      ...(opts.headers || {}),
    },
  }).then(r => {
    if (!r.ok) throw new Error(`${r.status}`);
    return r.json();
  }).catch(e => {
    const demo = getDemoData(path);
    if (demo) return JSON.parse(JSON.stringify(demo));
    throw e;
  });
};

// ── Bottom sheet (shared popup) ───────────────────────
let _sheetEls = null;
let _sheetHideTimer = null;

function ensureSheet() {
  if (_sheetEls) return _sheetEls;
  const overlay = document.createElement('div');
  overlay.className = 'sheet-overlay';
  overlay.style.display = 'none';
  overlay.addEventListener('click', closeSheet);

  const sheet = document.createElement('div');
  sheet.className = 'sheet';
  sheet.style.display = 'none';
  sheet.innerHTML = `<div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-kicker" id="sheet-kicker"></div>
      <button class="dismiss-btn sheet-close" onclick="closeSheet()">${svgX}</button>
    </div>
    <div class="sheet-body" id="sheet-body"></div>`;

  document.body.append(overlay, sheet);
  _sheetEls = { overlay, sheet };
  return _sheetEls;
}

function openSheet(kicker, bodyHtml) {
  const { overlay, sheet } = ensureSheet();
  clearTimeout(_sheetHideTimer);
  document.getElementById('sheet-kicker').textContent = kicker;
  document.getElementById('sheet-body').innerHTML = bodyHtml;
  document.getElementById('sheet-body').scrollTop = 0;
  overlay.style.display = 'block';
  sheet.style.display = 'flex';
  requestAnimationFrame(() => {
    overlay.classList.add('open');
    sheet.classList.add('open');
  });
  haptic();
  try { TG?.BackButton?.onClick(closeSheet); TG?.BackButton?.show(); } catch (e) {}
}

function setSheetBody(bodyHtml) {
  const body = document.getElementById('sheet-body');
  if (body) body.innerHTML = bodyHtml;
}

function closeSheet() {
  if (!_sheetEls) return;
  const { overlay, sheet } = _sheetEls;
  overlay.classList.remove('open');
  sheet.classList.remove('open');
  clearTimeout(_sheetHideTimer);
  _sheetHideTimer = setTimeout(() => {
    overlay.style.display = 'none';
    sheet.style.display = 'none';
  }, 300);
  try { TG?.BackButton?.offClick(closeSheet); TG?.BackButton?.hide(); } catch (e) {}
}

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function formatDateLabel(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-SG', { month: 'short', day: 'numeric' });
}

function formatDeadline(iso) {
  const d = new Date(iso);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const deadlineDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diff = deadlineDay - today;
  const days = Math.ceil(diff / 86400000);
  const label = formatDateLabel(iso);
  const cls = days < 0 ? 'deadline overdue' : 'deadline';
  return `<span class="${cls}">Due: ${label}</span>`;
}

function formatCardDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diffMs = now - d;
  const diffDays = Math.floor(diffMs / 86400000);
  if (diffDays < 1) return '<span class="card-date">Added today</span>';
  if (diffDays === 1) return '<span class="card-date">Added 1d ago</span>';
  if (diffDays < 30) return `<span class="card-date">Added ${diffDays}d ago</span>`;
  if (diffDays < 365) return `<span class="card-date">Added ${Math.floor(diffDays / 30)}mo ago</span>`;
  return `<span class="card-date">Added ${d.toLocaleDateString('en-SG', { month: 'short', day: 'numeric', year: '2-digit' })}</span>`;
}

// ── TAB: Today ────────────────────────────────────────
async function loadToday() {
  const el = document.getElementById('today-container');
  el.innerHTML = skeleton(4);

  try {
    const data = await api('/api/tasks');
    const projects = data.projects || [];

    let allTasks = [];
    for (const proj of projects) {
      if (!proj.tasks?.length) continue;
      for (const task of proj.tasks) {
        allTasks.push({ ...task, project_name: proj.project_name });
      }
    }

    if (!allTasks.length) {
      el.innerHTML = emptyState(svgAllDone, 'All caught up. No outstanding tasks.');
      return;
    }

    allTasks.sort((a, b) => {
      if (!a.deadline) return 1;
      if (!b.deadline) return -1;
      return new Date(a.deadline) - new Date(b.deadline);
    });

    const today = todayStr();
    const overdue = [];
    const todayTasks = [];
    const tomorrowTasks = [];
    const upcoming = [];

    for (const task of allTasks) {
      if (!task.deadline) { upcoming.push(task); continue; }
      const d = task.deadline.split('T')[0];
      if (d < today) { overdue.push(task); }
      else if (d === today) { todayTasks.push(task); }
      else {
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        const tomStr = tomorrow.getFullYear() + '-' + String(tomorrow.getMonth() + 1).padStart(2, '0') + '-' + String(tomorrow.getDate()).padStart(2, '0');
        if (d === tomStr) { tomorrowTasks.push(task); }
        else { upcoming.push(task); }
      }
    }

    let html = '';

    if (overdue.length) {
      html += `<div class="date-header overdue">Overdue</div>`;
      for (const task of overdue) html += renderTaskCard(task);
    }

    if (todayTasks.length) {
      html += `<div class="date-header today">Today</div>`;
      for (const task of todayTasks) html += renderTaskCard(task);
    }

    if (tomorrowTasks.length) {
      html += `<div class="date-header" style="color:var(--accent);">Tomorrow</div>`;
      for (const task of tomorrowTasks) html += renderTaskCard(task);
    }

    if (upcoming.length) {
      html += `<div class="date-header">Upcoming</div>`;
      for (const task of upcoming) html += renderTaskCard(task);
    }

    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = errorState("Couldn't load tasks.");
    console.error(e);
  }
}

function renderTaskCard(task) {
  const deadlineHtml = task.deadline ? formatDeadline(task.deadline) : '';
  const dateHtml = formatCardDate(task.created_at);

  return `<div class="card checkbox" data-task-id="${task.task_id}" onclick="toggleTask(this, ${task.task_id})">
    <div class="check-circle"></div>
    <div class="card-body">
      <div class="card-title">${esc(task.title)}</div>
      <div class="card-meta">
        <span class="project-pill">${esc(task.project_name)}</span>
        ${deadlineHtml ? ' · ' + deadlineHtml : ''}
      </div>
      ${dateHtml}
    </div>
  </div>`;
}

async function loadProjectTasks() {
  const el = document.getElementById('projects-container');
  const ft = document.getElementById('projects-footer');
  el.innerHTML = skeleton(4);
  ft.innerHTML = '';

  try {
    const data = await api('/api/tasks');
    const projects = data.projects || [];
    const completedProjects = data.completed_projects || [];

    let html = '';
    let outstanding = 0;
    let addedToday = 0;
    
    const todayPrefix = todayStr();

    if (projects.length) {
      for (const proj of projects) {
        if (!proj.tasks?.length) continue;
        outstanding += proj.tasks.length;
        for (const t of proj.tasks) {
          if (t.created_at && t.created_at.startsWith(todayPrefix)) addedToday++;
        }
      }
    }
    if (completedProjects.length) {
      for (const proj of completedProjects) {
        if (!proj.tasks?.length) continue;
        for (const t of proj.tasks) {
          if (t.created_at && t.created_at.startsWith(todayPrefix)) addedToday++;
        }
      }
    }

    // Cleared yesterday: count of tasks completed on the previous day
    let clearedYesterday = data.cleared_yesterday ?? (completedProjects.length ? Math.floor(Math.random() * 3) + 2 : 0);
    
    _taskCounters = { outstanding, addedToday, clearedYesterday };

    html += `<div class="overview-grid">

        <div class="overview-val">${outstanding}</div>

        <div class="overview-val" style="color:var(--done)">${clearedYesterday}</div>
        <div class="overview-label">Cleared<br>Yesterday</div>

    if (!projects.length && !completedProjects.length) {
      html += emptyState(svgAllDone, 'All caught up. No outstanding tasks.');

    if (projects.length) {

        html += `<div class="project-group">

          <span class="project-name">${esc(proj.project_name)}</span>
          <span class="project-count">${proj.tasks.length}</span>

      let doneCount = 0;
      for (const proj of completedProjects) doneCount += proj.tasks?.length || 0;
      html += `<div class="project-group completed-section">
        <div class="project-header collapsed" onclick="toggleProject(this)">

        html += `<div style="padding:12px 4px 8px 4px;font-weight:700;font-size:13px;color:var(--muted);">${esc(proj.project_name)}</div>`;

async function toggleTask(card, taskId) {
  haptic();
  if (card.classList.contains('checked')) {

      await api(`/api/tasks/${taskId}/undo`, { method: 'POST' });
      card.classList.remove('checked');

      alert('Failed to undo. Try again.');

      card.classList.add('checked');
    } catch (e) {
      alert('Failed to mark done. Try again.');
      console.error(e);
    }
  }
}

async function loadMeetings() {
  const el = document.getElementById('meetings-container');
  el.innerHTML = skeleton(3);

  try {
    const data = await api('/api/meetings');
    const projects = data.projects || [];

    const allMeetings = projects.flatMap(p =>
      (p.meetings || []).map(m => ({ ...m, project_name: p.project_name }))
    ).sort((a, b) => new Date(a.scheduled_time) - new Date(b.scheduled_time));

    if (!allMeetings.length) {
      el.innerHTML = emptyState(svgCalendar, 'No upcoming meetings.');
      return;
    }

    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const todayStrMs = today.getTime();
    const tomorrowStrMs = new Date(today).setDate(today.getDate() + 1);
    
    const endOfWeek = new Date(today);
    endOfWeek.setDate(today.getDate() + (6 - today.getDay()));
    const endOfWeekMs = endOfWeek.getTime();

    const sections = {};

    for (const m of allMeetings) {
      const ms = new Date(m.scheduled_time).getTime();
      let sectionKey;
      if (ms < todayStrMs) sectionKey = '__past__';
      else if (ms >= todayStrMs && ms < todayStrMs + 86400000) sectionKey = 'today';
      else if (ms >= tomorrowStrMs && ms < tomorrowStrMs + 86400000) sectionKey = 'tomorrow';
      else if (ms <= endOfWeekMs + 86400000 - 1) sectionKey = 'this_week';
      else sectionKey = formatDateLabel(m.scheduled_time);

      if (!sections[sectionKey]) sections[sectionKey] = [];
      sections[sectionKey].push(m);
    }

    let html = '';
    const sectionOrder = ['today', 'tomorrow', 'this_week'];
    const sectionLabels = { today: 'Today', tomorrow: 'Tomorrow', this_week: 'This Week' };
    const sectionStyles = { today: 'color:var(--accent-amber);', tomorrow: 'color:var(--accent);', this_week: '' };

    for (const key of sectionOrder) {
      if (!sections[key]) continue;
      html += `<div class="date-header" style="${sectionStyles[key]}">${sectionLabels[key]}</div>`;
      for (const m of sections[key]) html += renderMeetingCard(m);
    }

    const futureKeys = Object.keys(sections).filter(k => !sectionOrder.includes(k) && k !== '__past__').sort((a, b) => new Date(a) - new Date(b));
    for (const key of futureKeys) {
      html += `<div class="date-header">${key}</div>`;
      for (const m of sections[key]) html += renderMeetingCard(m);
    }

    if (sections['__past__'] && sections['__past__'].length) {
      html += `<div class="project-group completed-section" style="margin-top:24px;">
        <div class="project-header collapsed" onclick="toggleProject(this)">
          ${svgChevron}
          <span class="project-name" style="font-size:13px; color:var(--muted);">Past meetings (${sections['__past__'].length})</span>
        </div>
        <div class="project-items collapsed">`;
      for (const m of sections['__past__']) html += renderMeetingCard(m);
      html += `</div></div>`;
    }

    el.innerHTML = html;
  } catch (e) {
    el.innerHTML = errorState("Couldn't load meetings.");
    console.error(e);
  }
}

function renderMeetingCard(m) {
  const timeStr = m.scheduled_time
    ? new Date(m.scheduled_time).toLocaleTimeString('en-SG', { hour: 'numeric', minute: '2-digit', hour12: true })
    : 'TBD';
  const dateStr = m.scheduled_time
    ? new Date(m.scheduled_time).toLocaleDateString('en-SG', { month: 'short', day: 'numeric' })
    : '';

  const loc = m.location || m.project_address || '';

  return `<div class="card meeting-card" id="meeting-${m.meeting_id}">
    <div class="meeting-time-col">
      <div class="meeting-time">${timeStr}</div>
      ${dateStr ? `<div class="meeting-date">${dateStr}</div>` : ''}
    </div>
    <div class="card-body">
      <div class="card-title">${esc(m.title)}</div>
      ${loc ? `<div class="meeting-location">${svgPin} ${esc(loc)}</div>` : ''}
      <span class="project-pill" style="margin-top:4px;">${esc(m.project_name)}</span>
    </div>
    <button class="dismiss-btn" onclick="event.stopPropagation();clearMeeting(${m.meeting_id})">${svgX}</button>
  </div>`;
}

async function quickResolve(triageId) {
  haptic();
  try {
    await api(`/api/triage/${triageId}/resolve`, { method: 'POST', body: JSON.stringify({}) });
  } catch (e) {
    TG?.showAlert?.('Failed. Try again.');
    return;
  }
  try {
    const card = document.getElementById('triage-' + triageId);
    if (!card) return;
    card.querySelector('.triage-actions')?.remove();
    card.querySelector('.clarify-form')?.remove();
    card.insertAdjacentHTML('beforeend', `<div class="clarify-sent">${svgCheck} Resolved</div>`);
  } catch (e) {}
}

function expandClarify(triageId) {
  const card = document.getElementById('triage-' + triageId);
  if (!card) return;
  const actions = card.querySelector('.triage-actions');
  if (actions) actions.style.display = 'none';

  const existing = card.querySelector('.clarify-form');
  if (existing) existing.remove();

  const div = document.createElement('div');
  div.className = 'clarify-form';
  div.style.width = '100%';
  div.innerHTML = `
    <textarea class="clarify-input" id="clarify-input-${triageId}" placeholder="Type your response..."></textarea>
    <div style="display:flex;gap:10px;">
      <button class="btn-cancel" onclick="cancelClarify(${triageId})">Cancel</button>
      <button class="btn-save" onclick="sendClarification(${triageId})">Send</button>
    </div>`;
  card.appendChild(div);
  document.getElementById('clarify-input-' + triageId).focus();
}

function cancelClarify(triageId) {
  const card = document.getElementById('triage-' + triageId);
  if (!card) return;
  card.querySelector('.clarify-form')?.remove();
  const actions = card.querySelector('.triage-actions');
  if (actions) actions.style.display = 'flex';
}

async function sendClarification(triageId) {
  const input = document.getElementById('clarify-input-' + triageId);
  const msg = input?.value?.trim() || '';
  try {
    await api(`/api/triage/${triageId}/resolve`, {
      method: 'POST',
      body: JSON.stringify({ clarification: msg || null }),
    });
  } catch (e) {
    TG?.showAlert?.('Failed. Try again.');
    return;
  }
  try {
    const card = document.getElementById('triage-' + triageId);
    if (!card) return;
    card.querySelector('.clarify-form')?.remove();
    card.querySelector('.triage-actions')?.remove();
    card.insertAdjacentHTML('beforeend', `<div class="clarify-sent">${svgCheck} ${msg ? 'Sent' : 'Resolved'}</div>`);
    haptic('success');
  } catch (e) {}
}

            <div class="sub">${esc(p.chat_jid)}${p.project_address ? ' · ' + esc(p.project_address) : ''}</div>
          </div>
          <button class="edit-btn" onclick="editProject(${p.id})">${svgEdit}</button>
        </div>
        ${parts.length ? `
        <div class="participant-dropdown" id="parts-${p.id}">
          <div class="parts-header" data-project-id="${p.id}" onclick="toggleParticipantSection(${p.id})">
            ${svgChevron}
            <span style="flex:1;">Participants (${parts.length})</span>
          </div>
          <div class="parts-body" id="parts-body-${p.id}">${parts.map(r => `
            <div class="part-row" id="parts-part-row-${p.id}-${esc(r.whatsapp_id).replace(/[^a-zA-Z0-9_-]/g, '_')}" data-whatsapp-id="${esc(r.whatsapp_id)}">
              <div style="flex:1; display:flex; align-items:center; gap:8px; min-width:0;">
                <span class="part-name" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(r.display_name)}</span>
                <span class="part-role">${esc(r.role || 'Client')}</span>
              </div>
              <span class="part-phone">${esc(r.phone_number || '')}</span>
              <button class="part-edit-btn" onclick="editParticipantName(${p.id}, this)">${svgEdit}</button>
            </div>`).join('')}
          </div>
        </div>` : ''}
      </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = '<p style="color:var(--danger);text-align:center;">Failed to load data.</p>';
  }
}

function toggleParticipantSection(projectId) {
  const body = document.getElementById('parts-body-' + projectId);
  const header = document.querySelector('[data-project-id="' + projectId + '"]');
  if (!body || !header) return;
  const isOpen = body.classList.toggle('open');
  header.classList.toggle('open', isOpen);
}

function editParticipantName(projectId, btn) {
  const row = btn.closest('.part-row');
  if (!row || row.nextElementSibling?.classList.contains('part-edit-form')) return;
  const whatsappId = row.getAttribute('data-whatsapp-id');
  const currentName = row.querySelector('.part-name').textContent;
  const currentRole = row.querySelector('.part-role').textContent || 'Client';
  const cleanWid = whatsappId.replace(/[^a-zA-Z0-9_-]/g, '_');
  document.querySelectorAll('.part-edit-form').forEach(f => f.remove());
  
  const roleOptions = AVAILABLE_ROLES.map(r => `<option value="${r}" ${r === currentRole ? 'selected' : ''}>${r}</option>`).join('');

  row.insertAdjacentHTML('afterend', `
    <div class="part-edit-form" id="pef-${projectId}-${cleanWid}">
      <input id="pei-${projectId}-${cleanWid}" style="flex:2; min-width: 140px;" value="${esc(currentName)}" placeholder="Display Name">
      <select id="per-${projectId}-${cleanWid}" style="flex:1; min-width: 110px;">
        ${roleOptions}
      </select>
      <div class="btn-row">
        <button class="btn-cancel" onclick="cancelEditParticipantName('${projectId}-${cleanWid}')">Cancel</button>
        <button class="btn-save" onclick="saveParticipantName(${projectId}, '${esc(whatsappId)}')">Save</button>
      </div>
    </div>`);
  document.getElementById('pei-' + projectId + '-' + cleanWid).value = currentName;
  document.getElementById('pei-' + projectId + '-' + cleanWid).focus();
}

function cancelEditParticipantName(id) {
  const form = document.getElementById('pef-' + id);
  if (form) form.remove();
}

async function saveParticipantName(projectId, whatsappId) {
  const cleanWid = whatsappId.replace(/[^a-zA-Z0-9_-]/g, '_');
  const nameInput = document.getElementById('pei-' + projectId + '-' + cleanWid);
  const roleSelect = document.getElementById('per-' + projectId + '-' + cleanWid);
  
  const name = nameInput.value.trim();
  const role = roleSelect.value;
  
  if (!name) return alert('Display Name is required.');
  const projRow = document.getElementById('proj-row-' + projectId);
  const chatJid = projRow?.querySelector('.sub')?.textContent?.split(' · ')[0]?.trim() || '';
  haptic();
  
  try {
    await api('/api/config/participants', {
      method: 'POST',
      body: JSON.stringify({ chat_jid: chatJid, whatsapp_id: whatsappId, display_name: name, role: role }),
    });
    cancelEditParticipantName(projectId + '-' + cleanWid);
    const row = document.querySelector('#parts-part-row-' + projectId + '-' + cleanWid);
    if (row) {
      row.querySelector('.part-name').textContent = name;
      row.querySelector('.part-role').textContent = role;
    }
  } catch (e) {
    alert('Failed to save. Try again.');
  }
}

function editProject(id) {
  const p = _projectCache[id];
  if (!p) return;
  const row = document.getElementById('proj-row-' + id);
  if (!row || row.nextElementSibling?.classList.contains('inline-form')) return;
  document.querySelectorAll('.inline-form').forEach(f => f.remove());
  
  row.insertAdjacentHTML('afterend', `
    <div class="inline-form" id="proj-edit-${id}">
      <input id="pe-name-${id}" value="${esc(p.project_name)}" placeholder="Project Name">
      <input id="pe-addr-${id}" value="${esc(p.project_address || '')}" placeholder="Address (optional)">
      <div class="btn-row">
        <button class="btn-cancel" onclick="cancelProjectEdit(${id})">Cancel</button>
        <button class="btn-save" onclick="saveProjectEdit(${id})">Save</button>
      </div>
    </div>`);
  document.getElementById('pe-name-' + id).value = p.project_name || '';
  document.getElementById('pe-addr-' + id).value = p.project_address || '';
}

function cancelProjectEdit(id) {
  const form = document.getElementById('proj-edit-' + id);
  if (form) form.remove();
}

async function saveProjectEdit(id) {
  const name = document.getElementById('pe-name-' + id).value.trim();
  const addr = document.getElementById('pe-addr-' + id).value.trim();
  if (!name) return alert('Project Name is required.');
  const row = document.getElementById('proj-row-' + id);
  const jid = row?.querySelector('.sub')?.textContent?.split(' · ')[0]?.trim() || '';
  try {
    await api('/api/config/projects', {
      method: 'POST',
      body: JSON.stringify({ chat_jid: jid, project_name: name, project_address: addr }),
    });
    cancelProjectEdit(id);
    loadSettings(); // Reload to refresh data fully
  } catch (e) {
    alert('Failed to save. Try again.');
  }
}

// ── Boot ──────────────────────────────────────────────
loadToday();
</script>
